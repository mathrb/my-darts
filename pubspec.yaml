name: dart_lodge
description: Local-first open-source darts scoring and statistics app for Android, iOS, and web.
version: 0.1.0+0

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  
  # Routing
  go_router: ^17.1.0
  
  # Local database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Web database (Drift with SQLite WASM)
  drift: ^2.31.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.41
  
  # Utility packages
  uuid: ^4.5.2
  intl: ^0.20.2
  
  # UI components
  flutter_svg: ^2.0.7
  google_fonts: ^6.2.0
  fl_chart: ^0.69.0

  # Error monitoring
  sentry_flutter: ^9.16.1

  # Settings / preferences
  shared_preferences: ^2.3.4
  package_info_plus: ^8.1.4
  
  # Code generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code generation
  build_runner: ^2.11.1
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.12.0
  drift_dev: ^2.13.0
  
  # Linting
  flutter_lints: ^6.0.0

  # Testing
  test: ^1.24.0
  mockito: ^5.4.0

flutter:
  uses-material-design: true
  
  # Assets configuration
  assets:
    - assets/images/
    - assets/icons/
  
