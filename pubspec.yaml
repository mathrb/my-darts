name: my_darts
description: A comprehensive darts scoring and statistics application
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.2.0
  
  # Routing
  go_router: ^12.0.0
  
  # Local database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Utility packages
  uuid: ^3.0.7
  intl: ^0.18.1
  
  # UI components
  flutter_svg: ^2.0.7
  
  # Code generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code generation
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  
  # Linting
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  # Assets configuration
  assets:
    - assets/images/
    - assets/icons/
  
  # Fonts configuration
  fonts:
    - family: DartFont
      fonts:
        - asset: assets/fonts/DartFont-Regular.ttf
        - asset: assets/fonts/DartFont-Bold.ttf
          weight: 700