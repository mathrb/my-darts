version: 2
updates:
  # Dart / Flutter packages from pub.dev
  - package-ecosystem: pub
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      pub-minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - dart

  # GitHub Actions used in .github/workflows/
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - github-actions
