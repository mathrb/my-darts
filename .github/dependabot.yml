version: 2
updates:
  # Dart / Flutter packages from pub.dev
  - package-ecosystem: pub
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      pub-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # 0.6.0+eol is an empty placeholder that bundles no native libs and
      # breaks Android. The pin lives on ^0.5.41 until the sqlite3 v3
      # migration in issue #126 lands and removes this package entirely.
      # See PR #127 for the original fix and #152 for a rejected
      # dependabot auto-bump.
      - dependency-name: "sqlite3_flutter_libs"
    labels:
      - dependencies
      - dart

  # GitHub Actions used in .github/workflows/
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - github-actions
