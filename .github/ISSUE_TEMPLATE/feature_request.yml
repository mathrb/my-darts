name: Feature request
description: Suggest a new feature, UX improvement, or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a feature or improvement that is **not**
        a new game mode (use the "Game mode proposal" template for those).
        Before opening, please check existing issues to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do? What's currently painful?
      placeholder: As a player, I want to … because …
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: |
        Does this affect persistence (game events, statistics projections)?
        UI only? New game configuration? The more you know, the easier triage.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, references, anything else relevant.
    validations:
      required: false
