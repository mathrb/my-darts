name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # PRs run on ubuntu only; push-to-main runs on ubuntu + macos.
        # macos jobs are slow and ~10× the runner cost — only worth it
        # post-merge as a sanity check, not as a merge gate.
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest"]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'

      - name: Cache pub-cache
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        # --no-fatal-infos: info-level lints (style, deprecated APIs) don't
        # block CI. Errors and warnings still do. See docs/RELEASES.md.
        run: flutter analyze --no-fatal-infos

      - name: Stats UI formatter gate
        # Block reintroduction of `toStringAsFixed` in feature presentation
        # layers. All stats display must route through StatFormatter so
        # trailing zeros / null fallbacks ('—') are consistent across the UI.
        # See issue #138.
        run: |
          if grep -rn "toStringAsFixed" lib/features/*/presentation/ 2>/dev/null; then
            echo "Error: toStringAsFixed found in lib/features/*/presentation/. Use StatFormatter instead."
            exit 1
          fi

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'
        uses: codecov/codecov-action@v6
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
