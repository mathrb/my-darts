name: Check sqlite3 v3 migration unblocked

# Polls pub.dev for a stable riverpod_generator > 4.0.3, the last
# blocker for the sqlite3 v3 migration tracked in issue #126.
# When a stable release lands, opens a follow-up issue (idempotent on title).

on:
  schedule:
    # Weekly, Monday 09:00 UTC. riverpod_generator stable won't ship multiple
    # times in a week, so daily polling is wasteful.
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  check:
    name: Check riverpod_generator stable
    runs-on: ubuntu-latest
    steps:
      - name: Query pub.dev for latest stable
        id: pubdev
        run: |
          set -euo pipefail
          json=$(curl -fsSL https://pub.dev/api/packages/riverpod_generator)
          latest=$(echo "$json" | jq -r '.latest.version')
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "Latest published version: $latest"

          # Pub returns the latest STABLE under .latest by default
          # (pre-releases are excluded unless explicitly requested).
          # Still guard against unexpected pre-release tags.
          if echo "$latest" | grep -qE '-(dev|beta|alpha|rc)'; then
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          fi

          # Compare against 4.0.3 (last known stable when issue #126 was filed).
          # Using sort -V for semver-ish comparison.
          if [ "$(printf '%s\n%s\n' "$latest" "4.0.3" | sort -V | tail -n1)" = "4.0.3" ]; then
            echo "is_newer=false" >> "$GITHUB_OUTPUT"
          elif [ "$latest" = "4.0.3" ]; then
            echo "is_newer=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_newer=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue if a newer stable is available
        if: steps.pubdev.outputs.is_stable == 'true' && steps.pubdev.outputs.is_newer == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST: ${{ steps.pubdev.outputs.latest }}
        run: |
          set -euo pipefail
          title="sqlite3 v3 migration unblocked — riverpod_generator ${LATEST} stable"

          # Idempotency: skip if an open issue with this title already exists.
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --state open --search "in:title \"$title\"" \
            --json number --jq 'length')
          if [ "$existing" != "0" ]; then
            echo "Issue already exists, skipping."
            exit 0
          fi

          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "$title" \
            --body "$(cat <<EOF
\`riverpod_generator ${LATEST}\` is available on pub.dev (stable).

This was the remaining blocker for the sqlite3 v3 migration tracked in #126.

Next steps:
- bump \`riverpod_generator\` to \`^${LATEST}\` in \`pubspec.yaml\`
- bump \`drift\` / \`drift_dev\` to \`^2.33.0\` (or latest)
- bump \`sqlite3\` to \`^3.1.5\` (or latest)
- remove \`sqlite3_flutter_libs\` dependency
- delete \`applyWorkaroundToOpenSqlite3OnOldAndroidVersions\` call in \`lib/core/persistence/drift/database_factory_native.dart\`
- re-download \`web/sqlite3.wasm\` matching the new sqlite3 version
- run \`build_runner build\`, \`flutter analyze\`, \`flutter test\`
- build and sideload a debug APK to confirm native libs auto-bundle

Auto-filed by \`.github/workflows/check-sqlite3-migration.yml\`.
EOF
)"
