name: Database Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ${{ matrix.engine }} Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        engine: ['sqlite', 'drift']
        os: ['ubuntu-latest', 'macos-latest']
        include:
          - os: ubuntu-latest
            sqlite-package: 'sqlite3 libsqlite3-dev'
            install-command: 'sudo apt-get install -y'
          - os: macos-latest
            sqlite-package: 'sqlite3'
            install-command: 'brew install'
    
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install SQLite
        if: matrix.engine == 'sqlite'
        run: ${{ matrix.install-command }} ${{ matrix.sqlite-package }}

      - name: Run build runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run SQLite Tests
        if: matrix.engine == 'sqlite'
        run: flutter test --tags sqlite --reporter expanded

      - name: Run Drift Tests
        if: matrix.engine == 'drift'
        run: flutter test --tags drift --reporter expanded

      - name: Run Hybrid Tests
        if: matrix.engine == 'both'
        run: flutter test test/hybrid_database_tests.dart --reporter expanded

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.engine }}-${{ matrix.os }}
          path: '**/*.xml'
