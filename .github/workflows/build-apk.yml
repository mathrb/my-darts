name: Build APK

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Rapid main pushes can fan out into duplicate APK artifacts. Cancel any
# in-flight run for the same ref when a newer commit lands.
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'

      - name: Cache pub-cache
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Create Android platform
        run: flutter create --platforms=android --org app .

      - name: Override applicationId to app.dartlodge
        run: bash tools/post-create-android.sh

      # PRs only need to verify the Android build compiles. No artifact upload.
      - name: Build debug APK (PR)
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug

      # Push to main produces a release-mode APK as a 7-day artifact for
      # internal testing. Release tagging produces the publishable, signed
      # build via release.yml.
      - name: Build release APK (push to main)
        if: github.event_name != 'pull_request'
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
        run: |
          flutter build apk --release \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=SENTRY_ENVIRONMENT="$SENTRY_ENVIRONMENT"

      - name: Upload main-branch APK artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: dartlodge-main-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
