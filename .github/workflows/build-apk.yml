name: Build APK

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Create Android platform
        run: flutter create --platforms=android --org app .

      - name: Override applicationId to app.dartlodge
        run: bash tools/post-create-android.sh

      # PRs only need to verify the Android build compiles. No artifact upload.
      - name: Build debug APK (PR)
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug

      # Push to main produces a release-mode APK as a 7-day artifact for
      # internal testing. Release tagging produces the publishable, signed
      # build via release.yml.
      - name: Build release APK (push to main)
        if: github.event_name != 'pull_request'
        run: flutter build apk --release --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} --dart-define=SENTRY_ENVIRONMENT=production

      - name: Upload main-branch APK artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dartlodge-main-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
